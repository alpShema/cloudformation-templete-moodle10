AWSTemplateFormatVersion: '2010-09-09'
Description: >
  IAM Automation Lab - Creates IAM Users, Groups, Policies, and a shared
  temporary password stored in Secrets Manager. Designed for GitSync deployment.


Parameters:
  PasswordLength:
    Type: Number
    Default: 16
    Description: Length of the auto-generated temporary password


Resources:

  # 1. SECRETS MANAGER
  IAMTemporaryPassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: iam-lab/temporary-password
      Description: Auto-generated temporary password for IAM lab users
      GenerateSecretString:
        SecretStringTemplate: '{"username": "lab-users"}'
        GenerateStringKey: password
        PasswordLength: !Ref PasswordLength
        ExcludeCharacters: '"@/\\'
      Tags:
        - Key: Lab
          Value: IAM-Automation


  # 2. SELF PASSWORD POLICY — Allows users to change their own password
  #    Without this, PasswordResetRequired: true will always fail
  #    because users have no permission to call iam:ChangePassword

  SelfPasswordPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: iam-lab-self-password-policy
      Description: Allows IAM users to change their own password on first login
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSelfPasswordChange
            Effect: Allow
            Action:
              - iam:ChangePassword
              - iam:GetAccountPasswordPolicy
            Resource: '*'


  # 3. S3 GROUP POLICY
  S3GroupPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: iam-lab-s3-group-policy
      Description: Allows users to list S3 buckets
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowListS3Buckets
            Effect: Allow
            Action:
              - s3:ListAllMyBuckets
              - s3:GetBucketLocation
              - s3:ListBucket
            Resource: '*'


  # 4. S3 IAM GROUP
  S3UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: iam-lab-s3-group
      ManagedPolicyArns:
        - !Ref S3GroupPolicy


  # 5. EC2 BASE GROUP POLICY
  EC2GroupPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: iam-lab-ec2-group-policy
      Description: Allows users to list and describe EC2 instances
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowDescribeEC2
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeInstanceTypes
              - ec2:DescribeInstanceStatus
              - ec2:DescribeRegions
              - ec2:DescribeAvailabilityZones
            Resource: '*'


  # 6. EC2 IAM GROUP
  EC2UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: iam-lab-ec2-group
      ManagedPolicyArns:
        - !Ref EC2GroupPolicy


  # 7. EC2 CREATE POLICY — only for ec2-user2
  EC2CreatePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: iam-lab-ec2-create-policy
      Description: Allows creating EC2 instances - assigned only to ec2-user2
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowRunEC2Instances
            Effect: Allow
            Action:
              - ec2:RunInstances
              - ec2:CreateTags
              - ec2:DescribeKeyPairs
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - ec2:DescribeVpcs
              - ec2:DescribeImages
            Resource: '*'


  # 8. IAM USER: s3-user
  S3User:
    Type: AWS::IAM::User
    DependsOn: IAMTemporaryPassword
    Properties:
      UserName: s3-user
      Groups:
        - !Ref S3UserGroup
      ManagedPolicyArns:
        - !Ref SelfPasswordPolicy   # ← ADDED: allows password reset on first login
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:iam-lab/temporary-password:SecretString:password}}'
        PasswordResetRequired: true
      Tags:
        - Key: Lab
          Value: IAM-Automation
        - Key: Group
          Value: S3Group


  # 9. IAM USER: ec2-user1
  EC2User1:
    Type: AWS::IAM::User
    DependsOn: IAMTemporaryPassword
    Properties:
      UserName: ec2-user1
      Groups:
        - !Ref EC2UserGroup
      ManagedPolicyArns:
        - !Ref SelfPasswordPolicy   # ← ADDED: allows password reset on first login
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:iam-lab/temporary-password:SecretString:password}}'
        PasswordResetRequired: true
      Tags:
        - Key: Lab
          Value: IAM-Automation
        - Key: Group
          Value: EC2Group


  # 10. IAM USER: ec2-user2
  EC2User2:
    Type: AWS::IAM::User
    DependsOn: IAMTemporaryPassword
    Properties:
      UserName: ec2-user2
      Groups:
        - !Ref EC2UserGroup
      ManagedPolicyArns:
        - !Ref EC2CreatePolicy
        - !Ref SelfPasswordPolicy   # ← ADDED: allows password reset on first login
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:iam-lab/temporary-password:SecretString:password}}'
        PasswordResetRequired: true
      Tags:
        - Key: Lab
          Value: IAM-Automation
        - Key: Group
          Value: EC2Group


Outputs:

  SecretManagerARN:
    Description: ARN of the Secrets Manager secret holding the temp password
    Value: !Ref IAMTemporaryPassword
    Export:
      Name: !Sub '${AWS::StackName}-TempPasswordSecretARN'

  SecretManagerConsoleURL:
    Description: Direct link to view the temporary password in AWS Console
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/secretsmanager/secret?name=iam-lab/temporary-password&region=${AWS::Region}'

  S3UserGroupName:
    Description: Name of the S3 IAM Group
    Value: !Ref S3UserGroup

  EC2UserGroupName:
    Description: Name of the EC2 IAM Group
    Value: !Ref EC2UserGroup

  UsersCreated:
    Description: IAM users created by this stack
    Value: 's3-user (S3Group), ec2-user1 (EC2Group - list only), ec2-user2 (EC2Group + create)'

  PasswordNote:
    Description: How to retrieve the temporary password
    Value: >
      Go to AWS Console > Secrets Manager > iam-lab/temporary-password >
      Retrieve secret value. All users share this password and must change it on first login.